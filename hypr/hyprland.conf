source = ~/.config/hypr/theme.conf

################
### MONITORS ###
################

monitor = , highres, auto, 2.25
monitor = eDP-1, 2880x1800@120, 0x0, 2.25, vrr, 1
monitor = HDMI-A-1, 1920x1080@119.88Hz, auto, 1.33
monitor = DP-2, 1920x1080@119.88Hz, auto, 1
monitor = DP-9, 1920x1080@119.88Hz, auto, 1
# monitor=eDP-1,disable

xwayland {
  force_zero_scaling = true
}

cursor {
    no_hardware_cursors = false
    sync_gsettings_theme = true
    inactive_timeout = 5
}

# debug {
#     overlay = true
#     damage_blink = false
# }
# render {
#     direct_scanout = true
# }

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus --new-window
# $menu = wofi --show drun
$menu = tofi-drun --drun-launch=true
$rog = rog-control-center
$screenshot = grim -g "$(slurp)" - | wl-copy
$browser = zen-browser
$powermenu = ~/.config/tofi/powermenu.sh
$lock = hyprlock
$note = obsidian

#################
### AUTOSTART ###
#################

exec-once = hyprpaper 
exec-once = waybar & $rog
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store 
exec-once = nm-applet --indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprsunset -t 6000
exec-once = ~/.config/hypr/scripts/switch_theme.sh nero

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,2
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#####################
### LOOK AND FEEL ###
#####################

general {
    # gaps_out = 10
    gaps_in = $gaps_in
    gaps_out = $gaps_out
    border_size = $border_size

    col.active_border = $active_border
    col.inactive_border = $inactive_border

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = $rounding
    rounding_power = $rounding_power

    active_opacity = $active_opacity
    inactive_opacity = $inactive_opacity

    shadow {
        enabled = $shadow_enabled
        range = $shadow_range
        render_power = $shadow_render_power
        color = $shadow_color
    }

    blur {
        enabled = $blur_enabled
        size = $blur_size
        passes = $blur_passes
        vibrancy = $blur_vibrancy
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.83, 0, 0.17, 1

    animation = windows, 1, 10, default, slide bottom
    animation = windowsOut, 1, 10, default, slide top
}


workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    background_color = 0x000000
    animate_manual_resizes = true
    vfr = true  
    vrr = 1     
    # always_follow_on_dnd = true
    # animate_manual_resizes = false
}

#############
### INPUT ###
#############

input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace
gesture = 4, horizontal, move
gesture = 3, up, close
gesture = 3, down, dispatcher, exec, hyprctl dispatch togglefloating; hyprctl dispatch resizeactive exact 800 600; hyprctl dispatch centerwindow

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, V, exec, hyprctl dispatch togglefloating; hyprctl dispatch resizeactive exact 800 600; hyprctl dispatch centerwindow
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit,
bind = $mainMod, W, exec, $browser
bind = $mainMod, O, exec, $note
bind = , F6, exec, $screenshot
bind = $mainMod, N, exec, $powermenu
bind = $mainMod, F12, exec, $lock
bind = , XF86Launch1, exec, $rog
bind = $mainMod, V, exec, cliphist list | tofi | cliphist decode | wl-copy
bind = $mainMod, T, exec, ~/.config/hypr/scripts/switch_theme.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, resizeactive, -70 0
bind = $mainMod SHIFT, right, resizeactive, 70 0
bind = $mainMod SHIFT, up, resizeactive, 0 70
bind = $mainMod SHIFT, down, resizeactive, 0 -70

bind = $mainMod, Space, workspace, empty
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bezier = myBezier, 0.05, 0.9, 0.1, 1.05
animation = specialWorkspace, 1, 6, myBezier, slidevert

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl= , switch:off:Lid Switch,exec,hyprlock
bindl = , switch:on:Lid Switch, exec, hyprlock

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# windowrule per il bluetooth 
windowrule = match:class blueberry.py, float on
windowrule = match:class blueberry.py, size 400 500
windowrule = match:class blueberry.py, move (monitor_w-410) 35

# windowrule per gnome-calculator
windowrule = match:class org.gnome.Calculator, float on
windowrule = match:class org.gnome.Calculator, size 400 500
windowrule = match:class org.gnome.Calculator, move (monitor_w-410) 95

windowrule = match:workspace name:special:magic, opacity 0.80 0.50

# Questa regola intercetta la maggior parte dei selettori di file (GTK/Portal)
windowrule = match:title ^(Apri file|Open File|Salva come|Save As|Sfoglia|Library)$, float on
windowrule = match:title ^(Apri file|Open File|Salva come|Save As|Sfoglia|Library)$, size 800 500
windowrule = match:title ^(Apri file|Open File|Salva come|Save As|Sfoglia|Library)$, center on

windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class xdg-desktop-portal-gtk, size 900 600
windowrule = match:class xdg-desktop-portal-gtk, center on

# Kitty rules
windowrule = match:class kitty, float on
windowrule = match:class kitty, size 800 600
windowrule = match:class kitty, center on

