###################
### MY PROGRAMS ###
###################
$terminal = footclient
$fileManager = footclient yazi
$menu = tofi-drun --drun-launch=true
$rog = rog-control-center
$screenshot = grim -g "$(slurp)" - | wl-copy
$browser = zen-browser
$powermenu = ~/.config/tofi/powermenu.sh
$lock = hyprlock
$note = obsidian

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, Space, exec, hyprctl dispatch togglefloating; hyprctl dispatch resizeactive exact 800 600; hyprctl dispatch centerwindow
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, W, exec, $browser
bind = $mainMod, O, exec, $note
bind = , F6, exec, $screenshot
bind = $mainMod, N, exec, $powermenu
bind = $mainMod, F12, exec, $lock
bind = $mainMod SHIFT, F12, exec, brightnessctl s 0
bind = , XF86Launch1, exec, $rog
bind = $mainMod, V, exec, cliphist list | tofi | cliphist decode | wl-copy
bind = $mainMod, T, exec, ~/.config/hypr/scripts/switch_theme.sh
bind = , mouse:277, killactive
bind = $mainMod, B, exec, ~/.local/bin/battery_mode.sh
bind = $mainMod, A, exec, ~/.config/hypr/scripts/pack_workspaces.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

binde = ALT, right, resizeactive, 30 0
binde = ALT, left,  resizeactive, -30 0
binde = ALT, up,    resizeactive, 0 -30
binde = ALT, down,  resizeactive, 0 30


bind = $mainMod, Space, workspace, empty
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bezier = myBezier, 0.05, 0.9, 0.1, 1.05
animation = specialWorkspace, 1, 6, myBezier, slidevert

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print "V " $2 * 100}' > $XDG_RUNTIME_DIR/wob.fifo
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print "V " $2 * 100}' > $XDG_RUNTIME_DIR/wob.fifo
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && (wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q "MUTED" && echo "V 0" || wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print "V " $2 * 100}') > $XDG_RUNTIME_DIR/wob.fifo
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+ | grep -oP '\(\K[^%]+' | awk '{print "B " $1}' > $XDG_RUNTIME_DIR/wob.fifo
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%- | grep -oP '\(\K[^%]+' | awk '{print "B " $1}' > $XDG_RUNTIME_DIR/wob.fifo

bindl = $mainMod, XF86AudioRaiseVolume, exec, playerctl next
bindl = $mainMod, XF86AudioLowerVolume, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl= , switch:off:Lid Switch,exec,hyprlock
bindl = , switch:on:Lid Switch, exec, hyprlock
